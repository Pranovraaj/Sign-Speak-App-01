# Aiven PostgreSQL Settings
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://sign-language-2026-signspeak.h.aivencloud.com:24521/defaultdb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:avnadmin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:HIDDEN_SECRET_NOT_COMMITTED}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# Server Port
server.port=${PORT:8080}
