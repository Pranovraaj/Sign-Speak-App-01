name: End-to-End and Load Tests

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # 1. Setup Java for Backend
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 2. Start Backend in background (using GitHub Secret for DB Password)
    - name: Start Spring Boot Backend
      env:
        SPRING_DATASOURCE_PASSWORD: ${{ secrets.AIVEN_DB_PASSWORD }}
      run: |
        cd Backend
        chmod +x mvnw
        ./mvnw spring-boot:run &
        echo "Waiting 45 seconds for backend to start up..."
        sleep 45

    # 3. Setup Node.js for Selenium
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Web Testing Dependencies
      run: npm install
      working-directory: Testing/web-selenium

    # 4. Run Selenium Tests
    - name: Run Web Selenium Tests
      run: npm test
      working-directory: Testing/web-selenium
      
    # 5. Upload Excel Report to GitHub
    - name: Upload Web Test Report (Excel)
      if: always() # Upload even if tests fail
      uses: actions/upload-artifact@v3
      with:
        name: Selenium-Excel-Report
        path: Testing/web-selenium/reports/*.xlsx

    # 6. Setup k6 for Load Testing
    - name: Install k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6
        
    # 7. Run Load Test
    - name: Run k6 Load Test
      run: k6 run Testing/load-testing/load_test.js
