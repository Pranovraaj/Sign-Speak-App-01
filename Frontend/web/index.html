<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="signspeak_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- MediaPipe Hands SDK CDN Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <title>signspeak_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Global listener callback registered by Dart
    window.onHandLandmarksDetected = null;

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      if (window.onHandLandmarksDetected) {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
          window.onHandLandmarksDetected(JSON.stringify(results.multiHandLandmarks));
        } else {
          window.onHandLandmarksDetected("[]");
        }
      }
    });

    // Automatically check DOM for any video preview streams initialized by Flutter
    let activeVideo = null;
    function checkVideo() {
      const video = document.querySelector('video');
      if (video && video !== activeVideo) {
        activeVideo = video;
        console.log("MediaPipe: Bound HTML video frame stream successfully!");
        
        async function process() {
          if (video === activeVideo && !video.paused) {
            try {
              await hands.send({ image: video });
            } catch (e) {
              // Ignore transient frame draw errors
            }
          }
          requestAnimationFrame(process);
        }
        
        video.addEventListener('play', process);
        if (!video.paused) {
          process();
        }
      }
    }
    setInterval(checkVideo, 1000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
